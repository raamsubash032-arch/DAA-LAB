<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>String Matching Algorithms Comparison</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:30px;
}
.container{
    max-width:1000px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}
h1,h2{
    text-align:center;
    color:#2c3e50;
}
label{
    font-weight:bold;
}
textarea,input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    font-size:16px;
}
button{
    padding:12px 20px;
    background:#3498db;
    color:#fff;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}
button:hover{
    background:#2980b9;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}
th{
    background:#3498db;
    color:white;
}
#result{
    margin-top:20px;
    background:#ecf0f1;
    padding:15px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>String Matching Algorithms</h1>

<label>Text</label>
<textarea id="text" rows="4">AABAACAADAABAABA</textarea>

<label>Pattern</label>
<input id="pattern" value="AABA">

<button onclick="runAlgorithms()">Run Algorithms</button>

<div id="result"></div>

<h2>Performance Comparison</h2>

<button onclick="performance()">Generate Comparison</button>

<table>
<thead>
<tr>
<th>Pattern</th>
<th>Naive Comparisons</th>
<th>KMP Comparisons</th>
<th>Rabin-Karp Comparisons</th>
</tr>
</thead>

<tbody id="performanceBody">

</tbody>

</table>

</div>

<script>

function naiveSearch(text,pattern){

let n=text.length;
let m=pattern.length;

let matches=[];
let comparisons=0;

for(let i=0;i<=n-m;i++){

let j=0;

while(j<m){

comparisons++;

if(text[i+j]!=pattern[j])
break;

j++;
}

if(j==m)
matches.push(i);

}

return {matches,comparisons};

}

function computeLPS(pattern){

let m=pattern.length;

let lps=new Array(m).fill(0);

let len=0;
let i=1;

while(i<m){

if(pattern[i]==pattern[len]){

len++;

lps[i]=len;

i++;

}
else{

if(len!=0)
len=lps[len-1];

else{

lps[i]=0;
i++;

}

}

}

return lps;

}

function kmpSearch(text,pattern){

let n=text.length;
let m=pattern.length;

let lps=computeLPS(pattern);

let matches=[];
let comparisons=0;

let i=0;
let j=0;

while(i<n){

comparisons++;

if(pattern[j]==text[i]){

i++;
j++;

}

if(j==m){

matches.push(i-j);

j=lps[j-1];

}
else if(i<n && pattern[j]!=text[i]){

if(j!=0)
j=lps[j-1];
else
i++;

}

}

return {matches,comparisons};

}

function rabinKarp(text,pattern){

let d=256;
let q=101;

let n=text.length;
let m=pattern.length;

let h=1;

for(let i=0;i<m-1;i++)
h=(h*d)%q;

let pHash=0;
let tHash=0;

let comparisons=0;

let matches=[];

for(let i=0;i<m;i++){

pHash=(d*pHash+pattern.charCodeAt(i))%q;

tHash=(d*tHash+text.charCodeAt(i))%q;

}

for(let s=0;s<=n-m;s++){

if(pHash==tHash){

let flag=true;

for(let k=0;k<m;k++){

comparisons++;

if(text[s+k]!=pattern[k]){

flag=false;

break;

}

}

if(flag)
matches.push(s);

}

if(s<n-m){

tHash=(d*(tHash-text.charCodeAt(s)*h)+text.charCodeAt(s+m))%q;

if(tHash<0)
tHash+=q;

}

}

return {matches,comparisons};

}

function runAlgorithms(){

let text=document.getElementById("text").value;

let pattern=document.getElementById("pattern").value;

let naive=naiveSearch(text,pattern);

let kmp=kmpSearch(text,pattern);

let rk=rabinKarp(text,pattern);

document.getElementById("result").innerHTML=`

<h3>Results</h3>

<p><b>Naive Search</b><br>
Matches: ${naive.matches.join(", ")}<br>
Comparisons: ${naive.comparisons}</p>

<p><b>KMP Search</b><br>
Matches: ${kmp.matches.join(", ")}<br>
Comparisons: ${kmp.comparisons}</p>

<p><b>Rabin-Karp</b><br>
Matches: ${rk.matches.join(", ")}<br>
Comparisons: ${rk.comparisons}</p>

`;

}

function randomText(length){

const chars="ABCD";

let s="";

for(let i=0;i<length;i++){

s+=chars[Math.floor(Math.random()*4)];

}

return s;

}

function performance(){

let text=randomText(10000);

let patterns=[
"AB",
"ABCD",
"ABCDAB",
"ABCDABCD"
];

let tbody=document.getElementById("performanceBody");

tbody.innerHTML="";

patterns.forEach(pattern=>{

let n=naiveSearch(text,pattern);

let k=kmpSearch(text,pattern);

let r=rabinKarp(text,pattern);

tbody.innerHTML+=`

<tr>

<td>${pattern}</td>

<td>${n.comparisons}</td>

<td>${k.comparisons}</td>

<td>${r.comparisons}</td>

</tr>

`;

});

}

</script>

</body>
</html>
