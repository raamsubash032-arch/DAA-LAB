<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kruskal's & Prim's MST</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#1565C0;
}

button{
    background:#1565C0;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    margin:10px;
}

button:hover{
    background:#0D47A1;
}

.result{
    margin-top:20px;
    background:#eef5ff;
    padding:20px;
    border-radius:8px;
}

pre{
    font-size:15px;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h1>Minimum Spanning Tree</h1>

<h2>Kruskal's & Prim's Algorithm</h2>

<button onclick="runKruskal()">Run Kruskal</button>

<button onclick="runPrim()">Run Prim</button>

<div class="result">

<pre id="output"></pre>

</div>

</div>

<script>

// Graph

const n = 7;

const edges = [
[7,0,1],
[5,0,3],
[8,1,2],
[9,1,3],
[7,1,4],
[5,2,4],
[15,3,4],
[6,3,5],
[8,4,5],
[9,4,6],
[11,5,6]
];

// Build adjacency list

const adj={};

edges.forEach(([w,u,v])=>{

if(!adj[u]) adj[u]=[];

if(!adj[v]) adj[v]=[];

adj[u].push([v,w]);

adj[v].push([u,w]);

});

// Union Find

class UnionFind{

constructor(n){

this.parent=[];

this.rank=[];

for(let i=0;i<n;i++){

this.parent[i]=i;

this.rank[i]=0;

}

}

find(x){

if(this.parent[x]!=x)

this.parent[x]=this.find(this.parent[x]);

return this.parent[x];

}

union(x,y){

let rx=this.find(x);

let ry=this.find(y);

if(rx==ry) return false;

if(this.rank[rx]<this.rank[ry]){

let t=rx;

rx=ry;

ry=t;

}

this.parent[ry]=rx;

if(this.rank[rx]==this.rank[ry])

this.rank[rx]++;

return true;

}

}

// Kruskal

function runKruskal(){

let sorted=[...edges].sort((a,b)=>a[0]-b[0]);

let uf=new UnionFind(n);

let cost=0;

let ans="=== Kruskal's MST ===\n\n";

let count=0;

for(let [w,u,v] of sorted){

if(uf.union(u,v)){

cost+=w;

count++;

ans+="Edge ("+u+" - "+v+") Weight : "+w+"\n";

}

if(count==n-1) break;

}

ans+="\nTotal Cost = "+cost;

document.getElementById("output").textContent=ans;

}

// Prim

function runPrim(){

let visited=new Array(n).fill(false);

let key=new Array(n).fill(Infinity);

let parent=new Array(n).fill(-1);

key[0]=0;

let cost=0;

let ans="=== Prim's MST ===\n\n";

for(let i=0;i<n;i++){

let u=-1;

for(let j=0;j<n;j++){

if(!visited[j]&&(u==-1||key[j]<key[u]))

u=j;

}

visited[u]=true;

if(parent[u]!=-1){

ans+="Edge ("+parent[u]+" - "+u+") Weight : "+key[u]+"\n";

cost+=key[u];

}

for(let [v,w] of adj[u]){

if(!visited[v]&&w<key[v]){

key[v]=w;

parent[v]=u;

}

}

}

ans+="\nTotal Cost = "+cost;

document.getElementById("output").textContent=ans;

}

</script>

</body>
</html>
